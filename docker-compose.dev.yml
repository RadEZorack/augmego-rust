services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: augmego
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d augmego"]
      interval: 5s
      timeout: 5s
      retries: 20

  dev-proxy:
    image: nginx:1.27-alpine
    container_name: augmego-dev-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./dev-proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./dev-proxy/certs:/etc/nginx/certs:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres-data:
