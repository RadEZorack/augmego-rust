services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: augmego
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d augmego"]
      interval: 5s
      timeout: 5s
      retries: 20

  next-web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/augmego?schema=public
      WEB_BASE_URL: http://localhost:3001
      NEXTAUTH_URL: http://localhost:3001
      AUTH_SECRET: replace-me-for-production
      PORT: "3000"
      COOKIE_SAMESITE: Lax
      COOKIE_SECURE: "false"
      WORLD_STORAGE_PROVIDER: local
      WORLD_STORAGE_ROOT: ../../storage/world-assets
      GAME_WORLD_ROOT: ../../storage/world-ts
      GAME_WORLD_SEED: "2792211969"
      GAME_VIEW_RADIUS: "4"
      GAME_WS_HEARTBEAT_MS: "15000"
    ports:
      - "3001:3000"
    volumes:
      - next-storage:/app/storage

volumes:
  postgres-data:
  next-storage:
