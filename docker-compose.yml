services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: augmego
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d augmego"]
      interval: 5s
      timeout: 5s
      retries: 20

  rust-app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/augmego
      PUBLIC_BASE_URL: http://localhost:4000
      BACKEND_BIND_ADDR: 0.0.0.0:4000
      COOKIE_SAMESITE: Lax
      COOKIE_SECURE: "false"
      ASSET_STORAGE_PROVIDER: local
      ASSET_STORAGE_ROOT: /data/storage
      ASSET_STORAGE_NAMESPACE: world-assets
      SPACES_BUCKET: ${SPACES_BUCKET:-}
      SPACES_ENDPOINT: ${SPACES_ENDPOINT:-}
      SPACES_CUSTOM_DOMAIN: ${SPACES_CUSTOM_DOMAIN:-}
      SPACES_ACCESS_KEY_ID: ${SPACES_ACCESS_KEY_ID:-}
      SPACES_SECRET_ACCESS_KEY: ${SPACES_SECRET_ACCESS_KEY:-}
      SPACES_REGION: ${SPACES_REGION:-}
      BACKEND_STATIC_ROOT: /app/static
      BACKEND_SAVE_PATH: /data/world
      PET_POOL_TARGET: "30"
      GAME_BACKEND_AUTH_SECRET: ${GAME_BACKEND_AUTH_SECRET:-dev-only-game-backend-secret}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      MESHY_API_KEY: ${MESHY_API_KEY:-}
    ports:
      - "4000:4000"
    volumes:
      - world-data:/data/world
      - asset-data:/data/storage

volumes:
  postgres-data:
  world-data:
  asset-data:
