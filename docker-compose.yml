services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: augmego
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d augmego"]
      interval: 5s
      timeout: 5s
      retries: 20

  bun-backend:
    build:
      context: ./bun-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: "3000"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/augmego?schema=public
      WEB_BASE_URL: http://localhost:3001
      WEB_ORIGINS: http://localhost:3001
      COOKIE_SAMESITE: Lax
      COOKIE_SECURE: "false"
      WORLD_STORAGE_PROVIDER: local
      WORLD_STORAGE_ROOT: /app/storage/world-assets
    ports:
      - "3000:3000"
    volumes:
      - bun-storage:/app/storage

  voxel-backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      BACKEND_BIND_ADDR: 0.0.0.0:4000
      BACKEND_WS_BIND_ADDR: 0.0.0.0:4001
      BACKEND_SAVE_PATH: /data/world
    ports:
      - "4000:4000"
      - "4001:4001"
    volumes:
      - world-data:/data/world

  game-web:
    build:
      context: .
      dockerfile: game-web/Dockerfile
    restart: unless-stopped
    depends_on:
      - bun-backend
      - voxel-backend
    ports:
      - "3001:80"

  ngrok:
    image: ngrok/ngrok:latest
    container_name: augmego-ngrok
    profiles: ["ngrok"]
    depends_on:
      game-web:
        condition: service_started
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:-}
    command: ["start", "--all", "--config", "/etc/ngrok.yml"]
    volumes:
      - ./ngrok/ngrok.yml:/etc/ngrok.yml:ro
    ports:
      - "4040:4040"
    restart: unless-stopped

volumes:
  postgres-data:
  bun-storage:
  world-data:
