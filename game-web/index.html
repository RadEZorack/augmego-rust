<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Augmego Voxel Sandbox Web</title>
    <link data-trunk rel="rust" />
    <link data-trunk rel="copy-file" href="mesh-worker.js" />
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #d7ecfb;
        font-family: ui-sans-serif, system-ui, sans-serif;
        overscroll-behavior: none;
        touch-action: none;
      }

      body {
        display: grid;
      }

      canvas {
        width: 100vw;
        height: 100vh;
        display: block;
        touch-action: none;
      }

      #augmego-control-hint {
        position: fixed;
        top: max(0px, env(safe-area-inset-top));
        left: 50%;
        transform: translate(-50%, 50%);
        padding: 10px 12px;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.78);
        color: #1f2937;
        font-size: 14px;
        text-align: center;
        pointer-events: none;
        backdrop-filter: blur(12px);
      }
    </style>
  </head>
  <body>
    <div id="augmego-control-hint">Loading controls…</div>
  </body>
</html>
