<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Augmego Voxel Sandbox Web</title>
    <link data-trunk rel="rust" />
    <link data-trunk rel="copy-file" href="mesh-worker.js" />
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #d7ecfb;
        font-family: ui-sans-serif, system-ui, sans-serif;
      }

      body {
        display: grid;
      }

      canvas {
        width: 100vw;
        height: 100vh;
        display: block;
      }

      .hud {
        position: fixed;
        top: 12px;
        left: 12px;
        padding: 10px 12px;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.78);
        color: #1f2937;
        font-size: 14px;
        backdrop-filter: blur(12px);
      }
    </style>
  </head>
  <body>
    <div class="hud">WASD move, mouse look, Space up, Shift down</div>
  </body>
</html>
